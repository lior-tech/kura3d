<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a2d28">
<title>KURA3D — Douro Valley</title>
<meta name="description" content="KURA — a five-star spa resort in the Douro Valley, Portugal, by BOA Hotels. Step into the vision through ten cinematic renders.">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/favicon-180.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="KURA3D">
<meta property="og:title" content="KURA — Douro Valley">
<meta property="og:description" content="A five-star spa resort in the Douro Valley, Portugal, by BOA Hotels. Step into the vision.">
<meta property="og:image" content="assets/og-cover.jpg">
<meta property="og:url" content="https://kura3d.boahotels.com/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="KURA — Douro Valley">
<meta name="twitter:description" content="A five-star spa resort in the Douro Valley, Portugal, by BOA Hotels.">
<meta name="twitter:image" content="assets/og-cover.jpg">
<style>
  @font-face {
    font-family: 'PP Fragment Glare';
    src: url('assets/fonts/PPFragment-GlareLight.otf') format('opentype');
    font-weight: 300;
    font-display: swap;
  }
  @font-face {
    font-family: 'PP Fragment Glare';
    src: url('assets/fonts/PPFragment-GlareRegular.otf') format('opentype');
    font-weight: 400;
    font-display: swap;
  }

  :root {
    --green: #233b34;
    --green-deep: #1a2d28;
    --cream: #e2dfd6;
    --grey: #aca497;
    --black: #262626;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    min-height: 100dvh;
    overflow: hidden;
    background: var(--green-deep);
    color: var(--cream);
    font-family: 'PP Fragment Glare', Georgia, serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  .stage, .cover { height: 100dvh; }

  /* ---------- stage ---------- */
  .stage { position: fixed; inset: 0; }
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.4s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
  }
  .slide.active { opacity: 1; pointer-events: auto; }
  .slide img {
    position: relative;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.06);
    transition: transform 9s cubic-bezier(.2,0,.2,1);
  }
  .slide.active img { transform: scale(1); }

  /* non-landscape renders: show the full frame over a blurred fill */
  .slide.fit img {
    object-fit: contain;
    transform: scale(1.02);
  }
  .slide.fit .blur {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transform: scale(1.2);
    filter: blur(42px) brightness(.4) saturate(.85);
  }

  .stage::before, .stage::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    z-index: 2;
    pointer-events: none;
  }
  .stage::before {
    top: 0; height: 22vh;
    background: linear-gradient(to bottom, rgba(26,45,40,.72), transparent);
  }
  .stage::after {
    bottom: 0; height: 44vh;
    background: linear-gradient(to top, rgba(26,45,40,.9), transparent);
  }

  .grain {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    opacity: .32;
    mix-blend-mode: overlay;
  }

  /* ---------- header ---------- */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 26px 40px;
    padding-top: max(26px, env(safe-area-inset-top));
    padding-left: max(40px, env(safe-area-inset-left));
    padding-right: max(40px, env(safe-area-inset-right));
  }
  .brand { display: flex; align-items: center; gap: 16px; }
  .brand .mark { display: flex; align-items: center; gap: 8px; }
  .brand .mark img { height: 22px; display: block; }
  .brand .mark .td {
    font-size: 13px;
    letter-spacing: .18em;
    color: var(--grey);
    font-weight: 400;
    line-height: 1;
  }
  .brand .loc {
    font-size: 11px;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--grey);
    padding-left: 16px;
    border-left: 1px solid rgba(226,223,214,.3);
  }
  /* ---------- caption ---------- */
  .caption {
    position: fixed;
    left: 40px;
    bottom: 120px;
    z-index: 15;
    max-width: 62vw;
  }
  .caption .kicker {
    font-size: 11px;
    letter-spacing: .34em;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .caption .kicker::before {
    content: '';
    width: 34px;
    height: 1px;
    background: var(--grey);
    display: inline-block;
  }
  .caption h1 {
    font-weight: 300;
    font-size: clamp(34px, 5vw, 64px);
    line-height: 1.04;
    letter-spacing: .01em;
  }
  .caption .kicker, .caption h1 {
    opacity: 0;
    transform: translateY(14px);
    transition: opacity .9s ease, transform .9s ease;
  }
  .caption.show .kicker { opacity: 1; transform: none; transition-delay: .35s; }
  .caption.show h1 { opacity: 1; transform: none; transition-delay: .45s; }

  /* ---------- bottom bar ---------- */
  .bottom {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 15;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 26px;
    padding: 0 40px 22px;
    padding-bottom: max(22px, env(safe-area-inset-bottom));
    padding-left: max(40px, env(safe-area-inset-left));
    padding-right: max(40px, env(safe-area-inset-right));
  }
  .credit {
    display: flex;
    flex-direction: column;
    gap: 9px;
    min-width: 150px;
  }
  .credit .lockup { display: flex; align-items: center; gap: 11px; }
  .credit .lockup .by {
    font-size: 9px;
    letter-spacing: .26em;
    text-transform: uppercase;
    color: var(--grey);
  }
  .credit .lockup img { height: 14px; display: block; opacity: .95; }
  .credit .rights {
    font-size: 9px;
    letter-spacing: .12em;
    color: rgba(172,164,151,.75);
  }
  .right-cluster { display: flex; align-items: flex-end; gap: 22px; }
  .counter {
    font-size: 13px;
    letter-spacing: .18em;
    color: var(--grey);
    white-space: nowrap;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .counter .cur { color: var(--cream); font-size: 22px; }

  .thumbs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    max-width: 52vw;
  }
  .thumbs::-webkit-scrollbar { display: none; }
  .thumbs button {
    flex: 0 0 auto;
    width: 62px;
    height: 42px;
    padding: 0;
    border: 1px solid transparent;
    background: none;
    cursor: pointer;
    opacity: .45;
    transition: opacity .4s, border-color .4s;
  }
  .thumbs button img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(.85);
  }
  .thumbs button:hover { opacity: .8; }
  .thumbs button.active { opacity: 1; border-color: var(--cream); }

  .nav { display: flex; gap: 10px; }
  .nav button {
    width: 46px;
    height: 46px;
    border: 1px solid rgba(226,223,214,.35);
    background: none;
    color: var(--cream);
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: background .4s, color .4s;
  }
  .nav button:hover { background: var(--cream); color: var(--green); }
  .nav svg { width: 18px; height: 18px; stroke: currentColor; }

  .progress {
    position: fixed;
    left: 0; bottom: 0;
    height: 2px;
    background: var(--cream);
    z-index: 16;
    width: 0;
    transition: width .6s ease;
  }

  /* ---------- cover ---------- */
  .cover {
    position: fixed;
    inset: 0;
    z-index: 40;
    display: grid;
    place-items: center;
    text-align: center;
    overflow: hidden;
    transition: opacity 1.1s ease, visibility 1.1s ease;
  }
  .cover.hide { opacity: 0; visibility: hidden; }
  .cover .bg {
    position: absolute;
    inset: 0;
    background: url('img/web/the-estate.jpg') center/cover no-repeat;
    transform: scale(1.08);
    animation: coverZoom 14s ease forwards;
  }
  @keyframes coverZoom { to { transform: scale(1); } }
  .cover .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, rgba(26,45,40,.55), rgba(26,45,40,.5) 45%, rgba(26,45,40,.82));
  }
  .cover .inner {
    position: relative;
    z-index: 2;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }
  .cover .wm { display: flex; align-items: baseline; }
  .cover .wm img {
    height: clamp(48px, 8.5vw, 104px);
    opacity: 0;
    animation: rise 1.2s ease .2s forwards;
  }
  .cover .loc {
    font-size: clamp(11px, 1.4vw, 14px);
    letter-spacing: .4em;
    text-transform: uppercase;
    color: var(--grey);
    opacity: 0;
    animation: rise 1.1s ease .45s forwards;
  }
  .cover .enter {
    margin-top: 18px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: none;
    border: 1px solid rgba(226,223,214,.4);
    color: var(--cream);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: .3em;
    text-transform: uppercase;
    padding: 15px 32px;
    cursor: pointer;
    opacity: 0;
    animation: rise 1.1s ease 1.1s forwards;
    transition: background .4s, color .4s;
  }
  .cover .enter:hover { background: var(--cream); color: var(--green); }
  .cover .enter svg { width: 15px; height: 15px; stroke: currentColor; }
  .cover .enter { animation: rise 1.1s ease .65s forwards; }
  @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }

  @media (max-width: 720px) {
    header {
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top));
    }
    .brand .mark img { height: 18px; }
    .brand .loc { display: none; }
    .caption {
      left: calc(20px + env(safe-area-inset-left));
      right: calc(20px + env(safe-area-inset-right));
      bottom: calc(128px + env(safe-area-inset-bottom));
      max-width: none;
    }
    .caption h1 { font-size: clamp(30px, 9vw, 46px); }
    .thumbs { display: none; }

    .bottom {
      padding: 0 20px 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
      padding-left: calc(20px + env(safe-area-inset-left));
      padding-right: calc(20px + env(safe-area-inset-right));
      align-items: center;
    }
    .credit { min-width: 0; gap: 6px; }
    .credit .lockup .by { display: none; }
    .credit .lockup img { height: 13px; }
    .credit .rights { font-size: 8px; letter-spacing: .08em; }
    .right-cluster { gap: 12px; }
    .nav button { width: 44px; height: 44px; }
    .counter .cur { font-size: 19px; }
  }
</style>
</head>
<body>

<div class="stage" id="stage"></div>

<svg class="grain" xmlns="http://www.w3.org/2000/svg">
  <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2"/><feColorMatrix type="saturate" values="0"/></filter>
  <rect width="100%" height="100%" filter="url(#n)"/>
</svg>

<header>
  <div class="brand">
    <span class="mark"><img src="assets/kura-wordmark-white.png" alt="KURA"><span class="td">3D</span></span>
    <span class="loc">Douro Valley &middot; Portugal</span>
  </div>
</header>

<div class="caption" id="caption">
  <div class="kicker" id="kicker"></div>
  <h1 id="title"></h1>
</div>

<div class="bottom">
  <div class="credit">
    <div class="lockup">
      <span class="by">A Project by</span>
      <img src="assets/boa-brandname-white.png" alt="BOA Hotels">
    </div>
    <div class="rights">&copy; 2026 BOA Hotels &middot; All rights reserved</div>
  </div>
  <div class="thumbs" id="thumbs"></div>
  <div class="right-cluster">
    <div class="counter"><span class="cur" id="cur">01</span><span>/ 10</span></div>
    <div class="nav">
      <button id="prev" aria-label="Previous"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M15 5l-7 7 7 7"/></svg></button>
      <button id="next" aria-label="Next"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M9 5l7 7-7 7"/></svg></button>
    </div>
  </div>
</div>

<div class="progress" id="progress"></div>

<!-- Cover / The Project -->
<div class="cover" id="cover">
  <div class="bg"></div>
  <div class="inner">
    <div class="wm"><img src="assets/kura-wordmark-white.png" alt="KURA"></div>
    <div class="loc">Douro Valley &middot; Portugal</div>
    <button class="enter" id="enter">
      Step Inside
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M5 12h14m0 0l-6-6m6 6l-6 6"/></svg>
    </button>
  </div>
</div>

<script>
const SLIDES = [
  { slug: 'the-estate',              full: 'KURA-Douro-Valley-The-Estate.png',              title: 'The Estate',            kicker: 'The Land' },
  { slug: 'outdoor-pool',            full: 'KURA-Douro-Valley-Outdoor-Pool.png',            title: 'Outdoor Pool',          kicker: 'Open Air' },
  { slug: 'entrance-hall-reception', full: 'KURA-Douro-Valley-Entrance-Hall-Reception.jpg', title: 'Welcoming Hall',        kicker: 'Arrival' },
  { slug: 'piano-bar-lounge',        full: 'KURA-Douro-Valley-Piano-Bar-Lounge.jpg',        title: 'Piano Bar',             kicker: 'The Bar' },
  { slug: 'chef-restaurant',         full: 'KURA-Douro-Valley-Chef-Restaurant.jpg',         title: 'Chef Restaurant',       kicker: 'Dining' },
  { slug: 'spa-indoor-pool',         full: 'KURA-Douro-Valley-Spa-Indoor-Pool.png',         title: 'Spa Indoor Pool',       kicker: 'Wellness' },
  { slug: 'treatment-room',          full: 'KURA-Douro-Valley-Treatment-Room.jpg',          title: 'Spa Treatment Rooms',   kicker: 'Wellness', fit: true },
  { slug: 'outdoor-lounge',          full: 'KURA-Douro-Valley-Outdoor-Lounge.jpg',          title: 'Vineyards Experience',  kicker: 'Open Air', fit: true },
  { slug: 'view-over-guest-rooms',   full: 'KURA-Douro-Valley-View-Over-Guest-Rooms.png',   title: 'Guest Rooms',           kicker: 'Stay' },
  { slug: 'guest-room',              full: 'KURA-Douro-Valley-Guest-Room.png',              title: 'Standard Guest Room',   kicker: 'Stay' },
];

const stage = document.getElementById('stage');
const thumbs = document.getElementById('thumbs');
const caption = document.getElementById('caption');
const kickerEl = document.getElementById('kicker');
const titleEl = document.getElementById('title');
const curEl = document.getElementById('cur');
const progress = document.getElementById('progress');

SLIDES.forEach((s, i) => {
  const d = document.createElement('div');
  d.className = 'slide' + (s.fit ? ' fit' : '');
  d.innerHTML =
    (s.fit ? `<div class="blur" style="background-image:url('img/web/${s.slug}.jpg')"></div>` : '') +
    `<img src="img/web/${s.slug}.jpg" alt="${s.title}" ${i > 1 ? 'loading="lazy"' : ''}>`;
  stage.appendChild(d);

  const b = document.createElement('button');
  b.innerHTML = `<img src="img/web/${s.slug}.jpg" alt="">`;
  b.addEventListener('click', () => go(i));
  thumbs.appendChild(b);
});

const slideEls = [...stage.children];
const thumbEls = [...thumbs.children];
let idx = -1;

function go(i) {
  const n = (i + SLIDES.length) % SLIDES.length;
  if (n === idx) return;
  idx = n;
  const s = SLIDES[n];

  slideEls.forEach((el, j) => el.classList.toggle('active', j === n));
  thumbEls.forEach((el, j) => el.classList.toggle('active', j === n));
  thumbEls[n].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  caption.classList.remove('show');
  clearTimeout(go.t);
  go.t = setTimeout(() => {
    kickerEl.textContent = s.kicker;
    titleEl.textContent = s.title;
    caption.classList.add('show');
  }, 60);

  curEl.textContent = String(n + 1).padStart(2, '0');
  progress.style.width = ((n + 1) / SLIDES.length * 100) + '%';
}

document.getElementById('prev').addEventListener('click', () => go(idx - 1));
document.getElementById('next').addEventListener('click', () => go(idx + 1));
document.addEventListener('keydown', e => {
  if (document.getElementById('cover').classList.contains('hide')) {
    if (e.key === 'ArrowRight') go(idx + 1);
    if (e.key === 'ArrowLeft') go(idx - 1);
  } else if (e.key === 'Enter' || e.key === 'ArrowRight' || e.key === ' ') {
    enterShow();
  }
});

let tx = null;
document.addEventListener('touchstart', e => tx = e.touches[0].clientX, { passive: true });
document.addEventListener('touchend', e => {
  if (tx === null || !document.getElementById('cover').classList.contains('hide')) { tx = null; return; }
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) go(idx + (dx < 0 ? 1 : -1));
  tx = null;
}, { passive: true });

function enterShow() {
  document.getElementById('cover').classList.add('hide');
  go(0);
}
document.getElementById('enter').addEventListener('click', enterShow);

// preload first render behind the cover
new Image().src = 'img/web/' + SLIDES[0].slug + '.jpg';
</script>

</body>
</html>
